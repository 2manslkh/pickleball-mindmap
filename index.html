<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Pickleball Strategy — Grandmaster Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== DIP design tokens (see ../dip/DESIGN.md & packages/design-tokens) ===== */
    :root {
      /* color */
      --green: #10B981; --green-dark: #0B9A6D; --green-bg: #ECFDF5;
      --gold: #C4A33A; --gold-soft: #F5EFD0;
      --ink: #0F172A; --ink80: #1E293B; --body: #334155; --muted: #64748B;
      --line: #E2E8F0; --line2: #F1F5F9;
      --bg: #FFFFFF; --bg-soft: #F8FAFC;
      --warn: #F59E0B; --red: #DC2626;
      /* radius */
      --r-sm: 8px; --r-date: 10px; --r-swatch: 12px; --r-logo: 18px; --r-pill: 9999px;
      /* shadow — most surfaces use border+contrast; shadow reserved for CTA */
      --sh-cta: 0 6px 14px rgba(16,185,129,0.27);
      --sh-cta-strong: 0 6px 20px rgba(16,185,129,0.20);
      /* motion */
      --dur-snap: 120ms; --dur-normal: 220ms; --dur-slow: 400ms;
      --ease-out: cubic-bezier(0.2, 0.7, 0.3, 1);
      /* type */
      --font: "Plus Jakarta Sans", "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { background: var(--bg-soft); }
    body {
      font-family: var(--font); background: var(--bg-soft); color: var(--body);
      min-height: 100vh; padding-bottom: max(80px, env(safe-area-inset-bottom));
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      padding: 12px 16px; padding-top: max(12px, env(safe-area-inset-top));
      border-bottom: 1px solid var(--line);
    }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .header h1 { font-size: 18px; font-weight: 800; color: var(--ink); letter-spacing: -0.02em; }
    .header-actions { display: flex; gap: 6px; }
    .header-actions button {
      background: var(--bg); border: 1px solid var(--line); color: var(--body);
      width: 34px; height: 34px; border-radius: var(--r-sm); cursor: pointer;
      font-size: 14px; display: flex; align-items: center; justify-content: center;
      transition: background var(--dur-snap) var(--ease-out);
    }
    .header-actions button:active { background: var(--line2); }

    /* Overall progress bar */
    .overall-bar { height: 4px; background: var(--line2); border-radius: var(--r-pill); overflow: hidden; margin-bottom: 10px; }
    .overall-bar-fill { height: 100%; border-radius: var(--r-pill); background: linear-gradient(90deg, var(--green), var(--green-dark)); transition: width var(--dur-slow) var(--ease-out); }

    /* Pillar tabs */
    .pillar-tabs {
      display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none;
      padding-bottom: 2px;
    }
    .pillar-tabs::-webkit-scrollbar { display: none; }
    .pillar-tab {
      flex-shrink: 0; padding: 7px 14px; border-radius: var(--r-pill);
      font-size: 12px; font-weight: 600; cursor: pointer;
      border: 1px solid var(--line); background: var(--bg);
      color: var(--muted); transition: all var(--dur-snap) var(--ease-out); white-space: nowrap;
      user-select: none; -webkit-user-select: none;
    }
    .pillar-tab:active { transform: scale(0.96); }
    .pillar-tab.active { color: #fff; background: var(--green); border-color: var(--green); box-shadow: var(--sh-cta); }
    .pillar-tab .tab-score {
      display: inline-block; margin-left: 4px; font-size: 10px;
      opacity: 0.7; font-weight: 600;
    }

    /* Content area */
    .content { padding: 16px; max-width: 640px; margin: 0 auto; }

    /* Pillar hero */
    .pillar-hero {
      border-radius: var(--r-logo); padding: 20px; margin-bottom: 16px;
      position: relative; overflow: hidden;
      background: var(--green-bg); border: 1px solid rgba(16,185,129,0.22);
    }
    .pillar-hero .hero-eyebrow { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; color: var(--green-dark); margin-bottom: 6px; }
    .pillar-hero h2 { font-size: 26px; font-weight: 800; margin-bottom: 4px; color: var(--ink); letter-spacing: -0.03em; }
    .pillar-hero .chess-sub { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
    .pillar-hero .hero-stats { display: flex; gap: 24px; }
    .pillar-hero .hero-stat { text-align: left; }
    .pillar-hero .hero-stat .hs-val { font-size: 28px; font-weight: 800; color: var(--green-dark); letter-spacing: -0.02em; }
    .pillar-hero .hero-stat .hs-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 700; }

    /* Skill group */
    .skill-group { margin-bottom: 20px; }
    .skill-group-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
      cursor: pointer; user-select: none;
    }
    .skill-group-header h3 { font-size: 11px; font-weight: 700; color: var(--green-dark); text-transform: uppercase; letter-spacing: 0.14em; flex: 1; }
    .skill-group-header .sg-badge {
      font-size: 10px; padding: 3px 9px; border-radius: var(--r-pill);
      background: var(--green-bg); color: var(--green-dark); font-weight: 700;
    }
    .skill-group-header .sg-chevron { font-size: 11px; color: var(--muted); transition: transform var(--dur-normal) var(--ease-out); }
    .skill-group-header.collapsed .sg-chevron { transform: rotate(-90deg); }

    /* Skill card */
    .skill-card {
      background: var(--bg); border: 1px solid var(--line); border-radius: var(--r-swatch);
      padding: 14px 16px; margin-bottom: 8px;
      cursor: pointer; transition: border-color var(--dur-normal) var(--ease-out), background var(--dur-normal) var(--ease-out);
      position: relative;
    }
    .skill-card:active { background: var(--bg-soft); }
    .skill-card.expanded { border-color: var(--green); background: var(--bg); }
    .skill-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .skill-card .sc-label { font-size: 14px; font-weight: 600; color: var(--ink); line-height: 1.35; flex: 1; }
    .skill-card .sc-sub { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.35; }
    .skill-card .sc-chess { font-size: 10px; font-weight: 600; color: var(--gold); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.08em; }

    /* Inline rating dots */
    .sc-dots { display: flex; gap: 3px; flex-shrink: 0; padding-top: 3px; }
    .sc-dot {
      width: 10px; height: 10px; border-radius: 50%;
      border: 1.5px solid; transition: all var(--dur-snap) var(--ease-out);
    }
    .sc-dot.filled { transform: scale(1.1); }

    /* Expanded card content */
    .sc-expanded { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--line); }
    .sc-rate-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .sc-rate-label { font-size: 11px; color: var(--muted); min-width: 65px; }
    .sc-rate-btns { display: flex; gap: 4px; flex: 1; }
    .sc-rate-btn {
      flex: 1; height: 36px; border-radius: var(--r-sm); border: 1.5px solid var(--line);
      background: var(--bg-soft); color: var(--muted); font-size: 12px; font-weight: 700;
      cursor: pointer; transition: all var(--dur-snap) var(--ease-out); font-family: inherit;
    }
    .sc-rate-btn:active { transform: scale(0.94); }
    .sc-rate-btn.active { color: #fff; border-color: transparent; }
    .sc-rate-clear { font-size: 14px; color: var(--muted); cursor: pointer; padding: 4px 8px; border-radius: var(--r-sm); background: none; border: none; font-family: inherit; }
    .sc-rate-clear:active { color: var(--red); }

    .sc-notes textarea {
      width: 100%; height: 48px; background: var(--bg-soft);
      border: 1px solid var(--line); border-radius: var(--r-sm);
      color: var(--ink); font-family: inherit; font-size: 12px;
      padding: 8px 10px; resize: none;
    }
    .sc-notes textarea:focus { outline: none; border-color: var(--green); }
    .sc-notes textarea::placeholder { color: var(--muted); }

    /* Level labels */
    .level-labels { display: flex; justify-content: space-between; margin-top: 2px; margin-bottom: 8px; }
    .level-labels span { font-size: 9px; color: var(--muted); }
    .level-labels .current { font-weight: 700; }

    /* Quiz & Dashboard overlays */
    .overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(248,250,252,0.985); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      display: flex; flex-direction: column; align-items: center;
      padding: 20px; padding-top: max(60px, env(safe-area-inset-top));
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      transition: opacity var(--dur-slow) var(--ease-out); overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    .overlay.hidden { opacity: 0; pointer-events: none; }
    .overlay-card {
      width: 100%; max-width: 520px;
      background: var(--bg); border: 1px solid var(--line);
      border-radius: var(--r-logo); padding: 24px 20px;
      position: relative; max-height: calc(100vh - 80px);
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      box-shadow: 0 10px 30px rgba(15,23,42,0.08);
    }
    .overlay-close {
      position: fixed; top: max(16px, env(safe-area-inset-top)); right: 16px;
      background: var(--bg); border: 1px solid var(--line); color: var(--body);
      width: 40px; height: 40px; border-radius: var(--r-date);
      cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; z-index: 501;
    }
    .overlay-close:active { background: var(--line2); }

    /* Quiz styles */
    .quiz-progress { display: flex; gap: 3px; margin-bottom: 18px; }
    .quiz-progress .dot { height: 4px; flex: 1; border-radius: var(--r-pill); background: var(--line); transition: background var(--dur-normal) var(--ease-out); }
    .quiz-progress .dot.done { background: var(--green); }
    .quiz-progress .dot.wrong { background: var(--red); }
    .quiz-progress .dot.current { background: var(--gold); }
    .quiz-cat { font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--green-dark); margin-bottom: 8px; font-weight: 700; }
    .quiz-q { font-size: 17px; font-weight: 700; color: var(--ink); line-height: 1.4; margin-bottom: 16px; letter-spacing: -0.01em; }
    .quiz-scenario { background: var(--bg-soft); border: 1px solid var(--line); border-radius: var(--r-date); padding: 12px 14px; margin-bottom: 14px; font-size: 13px; color: var(--body); line-height: 1.5; }
    .quiz-opts { display: flex; flex-direction: column; gap: 8px; }
    .quiz-opt {
      background: var(--bg); border: 1.5px solid var(--line); border-radius: var(--r-date);
      padding: 12px 14px; cursor: pointer; font-size: 13px; color: var(--body);
      transition: all var(--dur-snap) var(--ease-out); text-align: left; font-family: inherit; line-height: 1.4;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .quiz-opt:active { transform: scale(0.97); background: var(--bg-soft); }
    .quiz-opt .opt-key { min-width: 22px; height: 22px; border-radius: 6px; background: var(--line2); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--muted); flex-shrink: 0; }
    .quiz-opt.correct { border-color: var(--green); background: var(--green-bg); }
    .quiz-opt.correct .opt-key { background: var(--green); color: #fff; }
    .quiz-opt.wrong { border-color: var(--red); background: #FEF2F2; }
    .quiz-opt.wrong .opt-key { background: var(--red); color: #fff; }
    .quiz-opt.disabled { pointer-events: none; opacity: 0.45; }
    .quiz-explain { margin-top: 14px; padding: 12px 14px; background: var(--bg-soft); border: 1px solid var(--line); border-radius: var(--r-date); font-size: 12px; color: var(--body); line-height: 1.5; }
    .quiz-explain strong { color: var(--ink); }
    .quiz-btn { margin-top: 14px; width: 100%; padding: 13px; background: var(--green); border: none; border-radius: var(--r-date); color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; box-shadow: var(--sh-cta); transition: transform var(--dur-snap) var(--ease-out); }
    .quiz-btn:active { transform: scale(0.98); }
    .quiz-btn.secondary { background: var(--line2); color: var(--body); margin-top: 8px; box-shadow: none; }

    /* Results */
    .results-center { text-align: center; }
    .score-ring { width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 4px solid; }
    .score-ring .sr-num { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; }
    .score-ring .sr-pct { font-size: 10px; opacity: 0.8; font-weight: 600; }
    .skill-update-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--line2); font-size: 11px; color: var(--body); }
    .su-up { color: var(--green); font-weight: 700; }
    .su-down { color: var(--red); font-weight: 700; }
    .su-same { color: var(--muted); }

    /* Dashboard */
    .dash-section { background: var(--bg); border: 1px solid var(--line); border-radius: var(--r-logo); padding: 18px; margin-bottom: 14px; }
    .dash-section h3 { font-size: 15px; font-weight: 800; margin-bottom: 12px; color: var(--ink); letter-spacing: -0.02em; }
    .pillar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .pillar-row .pr-label { width: 80px; font-size: 11px; color: var(--muted); text-align: right; flex-shrink: 0; }
    .pillar-row .pr-bar { flex: 1; height: 18px; background: var(--bg-soft); border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
    .pillar-row .pr-fill { height: 100%; border-radius: 6px; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; font-size: 9px; font-weight: 700; color: #fff; min-width: 24px; transition: width var(--dur-slow) var(--ease-out); }
    .weak-card { display: flex; align-items: center; gap: 10px; padding: 9px 11px; background: var(--bg-soft); border-radius: var(--r-sm); margin-bottom: 6px; border-left: 3px solid; }
    .weak-card .wc-name { flex: 1; font-size: 12px; color: var(--ink); }
    .weak-card .wc-stars { font-size: 10px; font-weight: 600; }
    .practice-block { background: var(--bg-soft); border-radius: var(--r-date); padding: 12px 14px; margin-bottom: 8px; }
    .practice-block h4 { font-size: 11px; font-weight: 700; margin-bottom: 4px; color: var(--ink); }
    .practice-block .pb-time { font-size: 10px; color: var(--gold); font-weight: 700; margin-bottom: 6px; }
    .practice-step { display: flex; gap: 6px; margin-bottom: 4px; font-size: 11px; color: var(--muted); line-height: 1.4; }
    .practice-step strong { color: var(--ink); }
    .practice-step .ps-num { min-width: 18px; height: 18px; background: var(--line2); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: var(--muted); flex-shrink: 0; }
    .hist-bars { display: flex; align-items: flex-end; gap: 3px; height: 60px; }
    .hist-bar { flex: 1; min-width: 6px; max-width: 20px; border-radius: 2px 2px 0 0; }

    /* Quiz FAB — premium green CTA */
    .quiz-fab {
      position: fixed; bottom: max(20px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
      z-index: 90;
      background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
      color: #fff; border: none; border-radius: var(--r-pill);
      padding: 14px 28px;
      font-size: 15px; font-weight: 700; font-family: inherit;
      cursor: pointer;
      box-shadow: var(--sh-cta-strong);
      transition: transform var(--dur-normal) var(--ease-out), box-shadow var(--dur-normal) var(--ease-out);
      letter-spacing: 0.01em;
    }
    .quiz-fab:active { transform: translateX(-50%) scale(0.95); }
    @media (min-width: 768px) {
      .quiz-fab:hover { transform: translateX(-50%) translateY(-1px); box-shadow: 0 8px 26px rgba(16,185,129,0.3); }
    }

    /* Radar */
    .radar-wrap { display: flex; justify-content: center; margin-bottom: 10px; }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <h1>🏓 Pickleball Strategy</h1>
      <div class="header-actions">
        <button id="btnDash" title="Dashboard">📈</button>
        <button id="btnExport" title="Export">💾</button>
      </div>
    </div>
    <div class="overall-bar"><div class="overall-bar-fill" id="overallBar"></div></div>
    <div class="pillar-tabs" id="pillarTabs"></div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="content" id="mainContent"></div>

  <!-- FLOATING QUIZ FAB -->
  <button class="quiz-fab" id="quizFab">🧠 Quiz Me</button>

  <!-- QUIZ OVERLAY -->
  <div class="overlay hidden" id="quizOverlay">
    <button class="overlay-close" id="quizClose">✕</button>
    <div class="overlay-card" id="quizCard"></div>
  </div>

  <!-- DASHBOARD OVERLAY -->
  <div class="overlay hidden" id="dashOverlay">
    <button class="overlay-close" id="dashClose">✕</button>
    <div id="dashContent" style="width:100%;max-width:560px;"></div>
  </div>

<script>
// ============ DATA ============
const pillars = [
  { id: 'score', label: 'Score Points', emoji: '⚔️', color: '#10B981', bg: '#ECFDF5', chess: 'Attack with purpose',
    groups: [
      { label: 'Force Errors', skills: [
        { id: 'diff_balls', label: 'Give difficult balls', sub: 'Calibrate to their skill level' },
        { id: 'exploit', label: 'Exploit weaknesses', sub: 'Find and attack what they can\'t do' },
      ]},
      { label: 'Create Weaknesses', skills: [
        { id: 'w1', label: 'Attack weak side', sub: 'Usually backhand' },
        { id: 'w2', label: 'Target weaker player', sub: 'In doubles' },
        { id: 'w3', label: 'Hit to the middle', sub: 'Creates confusion' },
        { id: 'w4', label: 'Move them laterally', sub: 'Open up the court' },
        { id: 'w5', label: 'Change pace & spin', sub: 'Disrupt timing' },
        { id: 'w6', label: 'Hit at their feet', sub: 'Forces pop-ups' },
      ]},
      { label: 'Attacking', skills: [
        { id: 'high_balls', label: 'Attack high balls at kitchen', sub: 'Lowest variance attack' },
        { id: 'at1', label: 'Speed-up at body/feet', sub: 'Least reaction time' },
        { id: 'at2', label: 'Erne', sub: 'Jump around the kitchen' },
        { id: 'at3', label: 'Overhead smash', sub: 'Punish short lobs' },
        { id: 'at4', label: 'Roll volley', sub: 'Topspin put-away with control' },
      ]},
    ]
  },
  { id: 'nolose', label: "Don't Lose", emoji: '🛡️', color: '#10B981', bg: '#ECFDF5', chess: 'Solid defense wins matches',
    groups: [
      { label: 'Avoid Errors', skills: [
        { id: 'drill', label: 'Drill technique', sub: 'Reps build consistency' },
        { id: 'dr1', label: 'Dink accuracy', sub: 'Placement and consistency' },
        { id: 'dr2', label: '3rd shot mastery', sub: 'Both drop and drive' },
        { id: 'dr3', label: 'Reset under pressure', sub: 'Block fast balls softly' },
      ]},
      { label: 'Play with Margin', skills: [
        { id: 'mg1', label: 'Dinks: 5-15cm over net', sub: 'Just clear, unattackable' },
        { id: 'mg2', label: 'Drives: as low as possible', sub: 'No free balls' },
        { id: 'mg3', label: 'Land 60cm inside lines', sub: 'Don\'t sail out' },
      ]},
      { label: 'Smart Shot Selection', skills: [
        { id: 'ss1', label: 'High % shots', sub: 'Unless clear put-away' },
        { id: 'ss2', label: 'Never speed up below net', sub: 'Hitting up = giving them the ball' },
      ]},
      { label: 'Defense & Resets', skills: [
        { id: 'def1', label: 'Soft block to kitchen', sub: 'Reset the rally' },
        { id: 'def2', label: 'Absorb pace (dead paddle)', sub: 'Soft hands, drop weight' },
        { id: 'def3', label: 'Emergency lob', sub: 'Buy time to recover' },
        { id: 'def4', label: 'Survive > hero shot', sub: 'Let THEM make the error' },
      ]},
    ]
  },
  { id: 'position', label: 'Positional', emoji: '♟️', color: '#10B981', bg: '#ECFDF5', chess: 'Control key squares',
    groups: [
      { label: 'Kitchen Line = Center Control', skills: [
        { id: 'kc1', label: 'Both at kitchen ASAP', sub: 'The team that gets there first wins' },
        { id: 'kc2', label: 'Transition zone = no man\'s land', sub: 'Pass through, never camp' },
        { id: 'kc3', label: '3rd shot drop = ticket to net', sub: 'Your way to advance' },
        { id: 'kc4', label: 'Push them back from their line', sub: 'Deep dinks, lobs, drives' },
      ]},
      { label: 'Court Geometry', skills: [
        { id: 'cg1', label: 'Cross-court = safe', sub: 'More margin, lower net' },
        { id: 'cg2', label: 'Down the line = high risk/reward', sub: 'Use when they cheat cross-court' },
        { id: 'cg3', label: 'Inside-out angles', sub: 'Pull them wide, open gaps' },
      ]},
      { label: 'Formations', skills: [
        { id: 'fm1', label: 'Side by side', sub: 'Default, cover court' },
        { id: 'fm2', label: 'Stacking', sub: 'Keep forehands in middle' },
        { id: 'fm3', label: 'Stay parallel', sub: 'Move as a unit, no gaps' },
        { id: 'fm4', label: 'Overloading', sub: 'One piece can\'t guard both sides', chess: true },
      ]},

const skillMap = {};
const allSkillIds = [];
pillars.forEach(p => p.groups.forEach(g => g.skills.forEach(s => { skillMap[s.id] = { ...s, pillar: p }; allSkillIds.push(s.id); })));

// ============ STATE ============
const SK = 'pickleball-gm-ratings';
const QHK = 'pickleball-gm-quiz-history';
const QSK = 'pickleball-gm-quiz-scores';
let ratings = JSON.parse(localStorage.getItem(SK) || '{}');
let quizHistory = JSON.parse(localStorage.getItem(QHK) || '{}');
let quizScoreHistory = JSON.parse(localStorage.getItem(QSK) || '[]');
let activePillar = 'score';
let expandedSkill = null;
let collapsedGroups = new Set();

function save() { localStorage.setItem(SK, JSON.stringify(ratings)); }
function saveQH() { localStorage.setItem(QHK, JSON.stringify(quizHistory)); }
function saveQS() { localStorage.setItem(QSK, JSON.stringify(quizScoreHistory)); }
function getRating(id) { return ratings[id] || { score: 0, notes: '' }; }
function setRating(id, score, notes) { ratings[id] = { score, notes, updated: new Date().toISOString() }; save(); }

const levels = ['','Beginner','Developing','Competent','Advanced','Elite'];
// Rating ramp from dip semantic tokens: red → warn → gold → greenDark → green
const levelColors = ['#64748B','#DC2626','#F59E0B','#C4A33A','#0B9A6D','#10B981'];

// ============ RENDER ============
function renderTabs() {
  const tabs = document.getElementById('pillarTabs');
  tabs.innerHTML = pillars.map(p => {
    const stats = getPillarStats(p);
    return `<div class="pillar-tab ${p.id === activePillar ? 'active' : ''}" data-id="${p.id}">${p.emoji} ${p.label}<span class="tab-score">${stats.avg > 0 ? stats.avg.toFixed(1) : ''}</span></div>`;
  }).join('');
  tabs.querySelectorAll('.pillar-tab').forEach(t => t.onclick = () => { activePillar = t.dataset.id; renderTabs(); renderContent(); });
}

function getPillarStats(p) {
  let total = 0, rated = 0, sum = 0;
  p.groups.forEach(g => g.skills.forEach(s => { total++; const r = getRating(s.id); if (r.score > 0) { rated++; sum += r.score; } }));
  return { total, rated, sum, avg: rated > 0 ? sum / rated : 0 };
}

function renderOverallBar() {
  let total = 0, rated = 0;
  allSkillIds.forEach(id => { total++; if (getRating(id).score > 0) rated++; });
  document.getElementById('overallBar').style.width = `${Math.round(rated / total * 100)}%`;
}

function renderContent() {
  const p = pillars.find(p => p.id === activePillar);
  const stats = getPillarStats(p);
  const content = document.getElementById('mainContent');

  let html = `<div class="pillar-hero">
    <div class="hero-eyebrow">Pillar</div>
    <h2>${p.emoji} ${p.label}</h2>
    <div class="chess-sub">♟️ ${esc(p.chess)}</div>
    <div class="hero-stats">
      <div class="hero-stat"><div class="hs-val">${stats.avg > 0 ? stats.avg.toFixed(1) : '—'}</div><div class="hs-label">Avg Level</div></div>
      <div class="hero-stat"><div class="hs-val">${stats.rated}/${stats.total}</div><div class="hs-label">Rated</div></div>
    </div>
  </div>`;

  p.groups.forEach(g => {
    const gKey = p.id + '_' + g.label;
    const isCollapsed = collapsedGroups.has(gKey);
    const gRated = g.skills.filter(s => getRating(s.id).score > 0).length;

    html += `<div class="skill-group">
      <div class="skill-group-header ${isCollapsed ? 'collapsed' : ''}" data-gkey="${esc(gKey)}">
        <h3>${esc(g.label)}</h3>
        <span class="sg-badge">${gRated}/${g.skills.length}</span>
        <span class="sg-chevron">▼</span>
      </div>`;

    if (!isCollapsed) {
      g.skills.forEach(s => {
        const r = getRating(s.id);
        const isExp = expandedSkill === s.id;
        const dotColor = p.color;

        html += `<div class="skill-card ${isExp ? 'expanded' : ''}" data-sid="${s.id}">
          <div class="skill-card-top">
            <div>
              <div class="sc-label">${esc(s.label)}</div>
              <div class="sc-sub">${esc(s.sub)}</div>
              ${s.chess ? '<div class="sc-chess">♟️ Chess concept</div>' : ''}
            </div>
            <div class="sc-dots">${[1,2,3,4,5].map(i => `<div class="sc-dot ${i <= r.score ? 'filled' : ''}" style="border-color:${i <= r.score ? levelColors[i] : '#2a2d42'};background:${i <= r.score ? levelColors[i] : 'transparent'}"></div>`).join('')}</div>
          </div>`;

        if (isExp) {
          html += `<div class="sc-expanded">
            <div class="sc-rate-row">
              <span class="sc-rate-label">Skill level</span>
              <div class="sc-rate-btns">${[1,2,3,4,5].map(i => `<button class="sc-rate-btn ${r.score === i ? 'active' : ''}" data-val="${i}" style="${r.score === i ? `background:${levelColors[i]};border-color:${levelColors[i]}` : ''}">${i}</button>`).join('')}</div>
              ${r.score > 0 ? `<button class="sc-rate-clear" data-sid="${s.id}">✕</button>` : ''}
            </div>
            <div class="level-labels">
              <span>Beginner</span>
              <span class="current" style="color:${r.score > 0 ? levelColors[r.score] : '#4a4d5e'}">${r.score > 0 ? levels[r.score] : 'Not rated'}</span>
              <span>Elite</span>
            </div>
            <div class="sc-notes"><textarea placeholder="Notes, drills, things to practice..." data-sid="${s.id}">${esc(r.notes || '')}</textarea></div>
          </div>`;
        }
        html += '</div>';
      });
    }
    html += '</div>';
  });

  // GM principle
  html += `<div style="text-align:center;padding:20px 16px;margin-top:8px;background:var(--gold-soft);border-radius:var(--r-logo);border:1px solid rgba(196,163,58,0.3)">
    <div style="font-size:11px;font-weight:700;color:var(--gold);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.14em">The GM Principle</div>
    <div style="font-size:13px;color:var(--ink80);line-height:1.55">Every shot is a move. Every move has a purpose.<br>If you can't explain WHY you hit that shot, you shouldn't have hit it.</div>
  </div>`;

  content.innerHTML = html;

  // Event binding
  content.querySelectorAll('.skill-group-header').forEach(h => {
    h.onclick = () => {
      const key = h.dataset.gkey;
      collapsedGroups.has(key) ? collapsedGroups.delete(key) : collapsedGroups.add(key);
      renderContent();
    };
  });

  content.querySelectorAll('.skill-card').forEach(card => {
    card.onclick = e => {
      if (e.target.closest('.sc-rate-btn') || e.target.closest('.sc-rate-clear') || e.target.closest('textarea')) return;
      const sid = card.dataset.sid;
      expandedSkill = expandedSkill === sid ? null : sid;
      renderContent();
    };
  });

  content.querySelectorAll('.sc-rate-btn').forEach(btn => {
    btn.onclick = () => {
      const sid = btn.closest('.skill-card').dataset.sid;
      const v = parseInt(btn.dataset.val);
      const cur = getRating(sid);
      setRating(sid, cur.score === v ? 0 : v, cur.notes || '');
      renderContent(); renderOverallBar(); renderTabs();
    };
  });

  content.querySelectorAll('.sc-rate-clear').forEach(btn => {
    btn.onclick = () => {
      const sid = btn.dataset.sid;
      const cur = getRating(sid);
      setRating(sid, 0, cur.notes || '');
      renderContent(); renderOverallBar(); renderTabs();
    };
  });

  content.querySelectorAll('.sc-notes textarea').forEach(ta => {
    ta.onclick = e => e.stopPropagation();
    ta.oninput = () => { const sid = ta.dataset.sid; const cur = getRating(sid); setRating(sid, cur.score || 0, ta.value); };
  });
}

  { skill:'in1',cat:'Initiative',diff:4,scenario:'In chess, a Zwischenzug = in-between move that disrupts opponent\'s plan.',question:'Opponent speeds up at you. Expected response: block or reset. What\'s the Zwischenzug?',options:[{text:'Block softly as expected',correct:false},{text:'Counter to their PARTNER — force a new problem',correct:true},{text:'Lob over them',correct:false},{text:'Call timeout',correct:false}],explanation:'Instead of the expected reset, redirect to the other opponent. Disrupts their follow-up plan.'},
  { skill:'in2',cat:'Initiative',diff:2,scenario:'Opponents play best at fast, aggressive pace.',question:'How to control tempo?',options:[{text:'Match their pace',correct:false},{text:'Slow them down with soft dinks and resets',correct:true},{text:'Speed up even faster',correct:false},{text:'Only lob',correct:false}],explanation:'Give them what they don\'t want. Fast players hate patient dinking.'},
  { skill:'in3',cat:'Initiative',diff:2,question:'Who usually has the advantage — dictating or reacting?',options:[{text:'The reactor — sees what\'s coming',correct:false},{text:'It\'s equal',correct:false},{text:'The dictator — reacting = always a step behind',correct:true},{text:'Depends on skill only',correct:false}],explanation:'Dictating = initiative. The reactor is always behind, making decisions under pressure.'},
  { skill:'pr1',cat:'Prophylaxis',diff:3,scenario:'In chess, prophylaxis = preventing opponent\'s plan before they execute.',question:'#1 prophylactic principle in pickleball?',options:[{text:'Hit hard so they can\'t set up',correct:false},{text:'Keep ball low — deny attackable balls',correct:true},{text:'Always lob',correct:false},{text:'Stand close to net',correct:false}],explanation:'If the ball never gets above the net, they can never attack. Pure prophylaxis.'},
  { skill:'pr2',cat:'Prophylaxis',diff:2,scenario:'Your last dink was too high. Opponent pounced.',question:'How to stop giving free speed-ups?',options:[{text:'Hit harder',correct:false},{text:'Keep every dink below net height at their contact point',correct:true},{text:'Only dink down the line',correct:false},{text:'Speed up before they can',correct:false}],explanation:'A dink that bounces above net height = free invitation to attack.'},
  { skill:'pr3',cat:'Prophylaxis',diff:2,question:'Between shots at the kitchen, where should your paddle be?',options:[{text:'Down by your side',correct:false},{text:'Up in front of your chest, ready',correct:true},{text:'Behind your body for backswing',correct:false},{text:'Doesn\'t matter',correct:false}],explanation:'Paddle up = millisecond reaction time. Paddle down = always late. Easiest free improvement.'},
  { skill:'pr4',cat:'Prophylaxis',diff:3,scenario:'Opponent loves sharp cross-court angles. Keeps pulling you wide.',question:'How to prophylactically remove that option?',options:[{text:'Hit everything down the line',correct:false},{text:'Position to cut off the cross-court angle',correct:true},{text:'Stand further from net',correct:false},{text:'Just move faster',correct:false}],explanation:'Shade cross-court — their favorite angle is covered, forced into second-best option.'},
  { skill:'pa1',cat:'Reads',diff:3,scenario:'Opponent about to hit a dink. You want to predict direction.',question:'What should you watch?',options:[{text:'Their eyes',correct:false},{text:'Their paddle angle',correct:true},{text:'Their feet',correct:false},{text:'The ball only',correct:false}],explanation:'Paddle angle = trajectory. Open face = lifting. Closed = driving. Most reliable read.'},
  { skill:'pa2',cat:'Reads',diff:3,scenario:'Opponent at baseline about to hit third shot. Drop or drive?',question:'What body cue gives it away?',options:[{text:'How loud they grunt',correct:false},{text:'Weight shift and shoulder turn — big load = drive, soft = drop',correct:true},{text:'Which foot is forward',correct:false},{text:'You can\'t tell',correct:false}],explanation:'Drive requires loading weight and rotation. Drop is softer. Read the body.'},
  { skill:'pa3',cat:'Reads',diff:3,scenario:'Cross-court dink rally. 4 dinks in a row, last one shorter.',question:'What should you anticipate?',options:[{text:'Another dink',correct:false},{text:'A speed-up is coming',correct:true},{text:'A lob',correct:false},{text:'Switch to down the line',correct:false}],explanation:'Repeated dinks + shorter ball = speed-up setup. Paddle up, be ready.'},
  { skill:'ad1',cat:'Adaptation',diff:2,scenario:'Early in the match — game 1.',question:'What should you prioritize?',options:[{text:'Winners to build a lead',correct:false},{text:'Scouting — observe tendencies and weaknesses',correct:true},{text:'Most aggressive style',correct:false},{text:'Being passive',correct:false}],explanation:'First 3 games = scouting. Watch backhand, pace handling, comfort zones.'},
  { skill:'ad2',cat:'Adaptation',diff:3,scenario:'Been attacking opponent\'s backhand. They\'re now protecting it better.',question:'What should you do?',options:[{text:'Keep attacking backhand',correct:false},{text:'Switch to forehand and middle — adjust harder',correct:true},{text:'Take a break',correct:false},{text:'More lobs',correct:false}],explanation:'They adjusted? Adjust harder. Exploit the over-protection — forehand/middle now open.'},
  { skill:'ad3',cat:'Adaptation',diff:3,scenario:'Opponent reads your dinks perfectly every time.',question:'What should you change?',options:[{text:'Hit harder',correct:false},{text:'Keep doing the same',correct:false},{text:'Vary patterns — targets, spin, timing',correct:true},{text:'Stop dinking',correct:false}],explanation:'You\'re too predictable. Vary everything. Unpredictability is a weapon.'},
  { skill:'mt1',cat:'Mental',diff:1,scenario:'You just double-faulted on a crucial point.',question:'What before the next point?',options:[{text:'Replay the error mentally',correct:false},{text:'Reset — last point is dead, next is all',correct:true},{text:'Aggressive serve to make up',correct:false},{text:'Apologize to partner at length',correct:false}],explanation:'Reset after every point. Dwelling carries negative energy. Deep breath, focus forward.'},
  { skill:'mt2',cat:'Mental',diff:2,scenario:'Leading 9-5 in a game to 11.',question:'How to adjust?',options:[{text:'Go for winners to close it',correct:false},{text:'Patient, high-percentage pickleball',correct:true},{text:'Try new shots with the cushion',correct:false},{text:'Speed up every ball',correct:false}],explanation:'Ahead = patient. Make them take risks to catch up. Scoreboard pressure works for you.'},
  { skill:'mt3',cat:'Mental',diff:3,scenario:'Score 9-9. Last two points were unforced errors.',question:'Right mindset?',options:[{text:'Play it safe',correct:false},{text:'Reset and play YOUR game — don\'t tighten up',correct:true},{text:'Go aggressive to end it',correct:false},{text:'Focus on not making errors',correct:false}],explanation:'Play YOUR game. "Not making errors" = negative focus = tentative. Trust your training.'},
];

let quizState = {};
function shuffleArray(a) { for (let i=a.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function pickQuestions(n) {
  const now=Date.now();
  const scored=questions.map((q,i)=>{
    const h=quizHistory[q.skill+'_'+i]; let p=0;
    if(!h) p=0; else if(!h.lastCorrect) p=1; else p=2+Math.max(0,10-(now-h.lastTime)/3600000);
    return {q,i,p:p+Math.random()*1.5};
  });
  scored.sort((a,b)=>a.p-b.p);
  return scored.slice(0,n).map(s=>({...s.q,_oi:s.i}));
}

function startQuiz() {
  const picked=shuffleArray(pickQuestions(Math.min(12,questions.length)));
  quizState={active:true,qs:picked,cur:0,ans:[],scores:{}};
  document.getElementById('quizOverlay').classList.remove('hidden');
  renderQ();
}

function renderQ() {
  const q=quizState.qs[quizState.cur], total=quizState.qs.length, num=quizState.cur+1;
  const opts=[...q.options.map((o,i)=>({...o,oi:i}))]; shuffleArray(opts);
  quizState._opts=opts; quizState._ci=opts.findIndex(o=>o.correct);
  const keys=['A','B','C','D'];
  let dots=''; for(let i=0;i<total;i++){let c='dot';if(i<quizState.ans.length)c+=quizState.ans[i].correct?' done':' wrong';else if(i===quizState.cur)c+=' current';dots+=`<div class="${c}"></div>`;}
  document.getElementById('quizCard').innerHTML=`
    <div class="quiz-progress">${dots}</div>
    <div class="quiz-cat">${esc(q.cat)} · ${num}/${total}</div>
    ${q.scenario?`<div class="quiz-scenario">${esc(q.scenario)}</div>`:''}
    <div class="quiz-q">${esc(q.question)}</div>
    <div class="quiz-opts" id="qOpts">${opts.map((o,i)=>`<button class="quiz-opt" data-i="${i}"><span class="opt-key">${keys[i]}</span><span>${esc(o.text)}</span></button>`).join('')}</div>`;
  document.querySelectorAll('.quiz-opt').forEach(b=>b.onclick=()=>answerQ(parseInt(b.dataset.i)));
  quizState._done=false;
  document.onkeydown=e=>{
    if(!quizState.active)return; if(e.key==='Escape'){closeQuiz();return;}
    const km={a:0,b:1,c:2,d:3};
    if(e.key.toLowerCase()in km&&!quizState._done){e.preventDefault();answerQ(km[e.key.toLowerCase()]);}
    if((e.key==='Enter'||e.key===' ')&&quizState._done){e.preventDefault();nextQ();}
  };
}

function answerQ(idx) {
  if(quizState._done)return; quizState._done=true;
  const q=quizState.qs[quizState.cur], ci=quizState._ci, ok=idx===ci;
  quizState.ans.push({correct:ok,skill:q.skill,diff:q.diff});
  if(!quizState.scores[q.skill])quizState.scores[q.skill]={c:0,t:0,md:0};
  quizState.scores[q.skill].t++; if(ok){quizState.scores[q.skill].c++;quizState.scores[q.skill].md=Math.max(quizState.scores[q.skill].md,q.diff);}
  const hk=q.skill+'_'+(q._oi||0);
  quizHistory[hk]={lastCorrect:ok,lastTime:Date.now(),attempts:(quizHistory[hk]?.attempts||0)+1}; saveQH();
  document.querySelectorAll('.quiz-opt').forEach((b,i)=>{if(i===ci)b.classList.add('correct');else if(i===idx&&!ok)b.classList.add('wrong');if(i!==idx&&i!==ci)b.classList.add('disabled');});
  const dots=document.querySelectorAll('.quiz-progress .dot');
  if(dots[quizState.cur]){dots[quizState.cur].classList.remove('current');dots[quizState.cur].classList.add(ok?'done':'wrong');}
  document.getElementById('qOpts').insertAdjacentHTML('afterend',`<div class="quiz-explain"><strong>${ok?'✅ Correct!':'❌ Not quite.'}</strong> ${esc(q.explanation)}</div><button class="quiz-btn" id="qNext">${quizState.cur<quizState.qs.length-1?'Next Question →':'See Results →'}</button>`);
  document.getElementById('qNext').onclick=nextQ;
}

function nextQ(){quizState.cur++;quizState.cur>=quizState.qs.length?showResults():renderQ();}

function showResults() {
  const t=quizState.ans.length,c=quizState.ans.filter(a=>a.correct).length,pct=Math.round(c/t*100);
  quizScoreHistory.push({date:new Date().toISOString(),correct:c,total:t,pct}); if(quizScoreHistory.length>50)quizScoreHistory=quizScoreHistory.slice(-50); saveQS();
  let grade,gc; if(pct>=90){grade='Elite';gc='#10B981';}else if(pct>=70){grade='Advanced';gc='#0B9A6D';}else if(pct>=50){grade='Competent';gc='#C4A33A';}else if(pct>=30){grade='Developing';gc='#F59E0B';}else{grade='Beginner';gc='#DC2626';}
  let upd=[]; for(const[sid,d]of Object.entries(quizState.scores)){const nd=skillMap[sid];if(!nd)continue;const old=getRating(sid).score||0;let ns;if(d.c===d.t)ns=Math.min(5,Math.max(old,Math.ceil(d.md*1.2)));else if(d.c>0)ns=Math.max(1,Math.min(5,Math.round(d.md*0.8)));else ns=Math.max(1,old>0?old-1:1);const cur=getRating(sid);setRating(sid,ns,cur.notes||'');upd.push({label:nd.label,old,ns});}
  let updH='';if(upd.length){updH='<div style="text-align:left;margin:16px 0"><div style="font-size:11px;font-weight:700;margin-bottom:8px">Skill Ratings Updated:</div>';upd.forEach(u=>{const stars=n=>'★'.repeat(n)+'☆'.repeat(5-n);let cls=u.ns>u.old?'su-up':u.ns<u.old?'su-down':'su-same';updH+=`<div class="skill-update-row"><span>${esc(u.label)}</span><span class="${cls}">${u.old>0?stars(u.old):'(new)'} → ${stars(u.ns)}</span></div>`;});updH+='</div>';}
  document.getElementById('quizCard').innerHTML=`<div class="results-center"><div class="score-ring" style="border-color:${gc};background:${gc}15"><div class="sr-num" style="color:${gc}">${c}/${t}</div><div class="sr-pct" style="color:${gc}">${pct}%</div></div><h2 style="color:${gc};font-size:18px;margin-bottom:6px">${grade}</h2><p style="font-size:13px;color:var(--muted);margin-bottom:8px">${c} of ${t} correct</p>${updH}<button class="quiz-btn" onclick="startQuiz()">🧠 Try Again</button><button class="quiz-btn secondary" onclick="closeQuiz()">Done</button></div>`;
  document.onkeydown=null; renderOverallBar(); renderTabs(); renderContent();
}

function closeQuiz(){quizState.active=false;document.getElementById('quizOverlay').classList.add('hidden');document.onkeydown=null;}

// ============ DASHBOARD ============
function renderDash() {
  const d=document.getElementById('dashContent');
  const ps=pillars.map(p=>({...p,...getPillarStats(p)}));

  // Radar
  const sz=220,cx=sz/2,cy=sz/2,mr=75;
  let svg=`<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}" style="overflow:visible">`;
  for(let l=1;l<=5;l++){const r=mr*l/5;let pts=pillars.map((_,i)=>{const a=i/pillars.length*Math.PI*2-Math.PI/2;return`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`;}).join(' ');svg+=`<polygon points="${pts}" fill="none" stroke="#E2E8F0"/>`;}
  pillars.forEach((p,i)=>{const a=i/pillars.length*Math.PI*2-Math.PI/2;svg+=`<line x1="${cx}" y1="${cy}" x2="${cx+mr*Math.cos(a)}" y2="${cy+mr*Math.sin(a)}" stroke="#E2E8F0" stroke-width="0.5"/>`;const lx=cx+(mr+24)*Math.cos(a),ly=cy+(mr+24)*Math.sin(a);const anc=Math.abs(Math.cos(a))<0.3?'middle':Math.cos(a)>0?'start':'end';svg+=`<text x="${lx}" y="${ly+4}" text-anchor="${anc}" fill="#334155" font-size="9" font-weight="700" font-family="Plus Jakarta Sans, Inter, sans-serif">${p.label}</text>`;});
  let dp=ps.map((p,i)=>{const a=i/pillars.length*Math.PI*2-Math.PI/2,r=mr*(p.avg/5);return`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`;}).join(' ');
  svg+=`<polygon points="${dp}" fill="rgba(16,185,129,0.18)" stroke="#10B981" stroke-width="2"/>`;
  ps.forEach((p,i)=>{const a=i/pillars.length*Math.PI*2-Math.PI/2,r=mr*(p.avg/5);svg+=`<circle cx="${cx+r*Math.cos(a)}" cy="${cy+r*Math.sin(a)}" r="4" fill="#10B981" stroke="#FFFFFF" stroke-width="2"/>`;});
  svg+='</svg>';

  let pillarBars='';ps.forEach(p=>{const pct=p.avg>0?Math.round(p.avg/5*100):0;pillarBars+=`<div class="pillar-row"><div class="pr-label">${p.label}</div><div class="pr-bar"><div class="pr-fill" style="width:${Math.max(5,pct)}%;background:${p.color}">${p.avg.toFixed(1)}</div></div></div>`;});

  // Weakest
  let all=[];allSkillIds.forEach(id=>{const s=skillMap[id],r=getRating(id);if(!s)return;all.push({id,label:s.label,score:r.score,sub:s.sub});});
  all.sort((a,b)=>{if(a.score===0&&b.score===0)return 0;if(a.score===0)return-1;if(b.score===0)return 1;return a.score-b.score;});
  let weakH='';all.slice(0,6).forEach(w=>{const c=w.score===0?'#64748B':w.score<=2?'#DC2626':'#C4A33A';weakH+=`<div class="weak-card" style="border-color:${c}"><div class="wc-name">${esc(w.label)}</div><div class="wc-stars" style="color:${c}">${w.score>0?'★'.repeat(w.score)+'☆'.repeat(5-w.score):'—'}</div></div>`;});

  // History
  let histH='';const recent=quizScoreHistory.slice(-20);
  if(recent.length){let bars='';recent.forEach(s=>{const h=Math.max(4,s.pct/100*55);const c=s.pct>=80?'#10B981':s.pct>=60?'#C4A33A':'#DC2626';bars+=`<div class="hist-bar" style="height:${h}px;background:${c}" title="${s.pct}%"></div>`;});histH=`<div class="hist-bars">${bars}</div>`;}
  else histH='<div style="text-align:center;padding:12px;color:var(--muted);font-size:11px">Take a quiz to see history</div>';

  d.innerHTML=`
    <div class="dash-section"><h3>📊 Skill Radar</h3><div class="radar-wrap">${svg}</div>${pillarBars}</div>
    <div class="dash-section"><h3>🔴 Areas to Improve</h3>${weakH}</div>
    <div class="dash-section"><h3>📈 Quiz History</h3>${histH}</div>`;
}

// ============ EVENT WIRING ============
document.getElementById('quizFab').onclick=startQuiz;
document.getElementById('quizClose').onclick=closeQuiz;
document.getElementById('btnDash').onclick=()=>{document.getElementById('dashOverlay').classList.remove('hidden');renderDash();};
document.getElementById('dashClose').onclick=()=>document.getElementById('dashOverlay').classList.add('hidden');
document.getElementById('btnExport').onclick=()=>{const b=new Blob([JSON.stringify({ratings,quizHistory,quizScoreHistory,exportDate:new Date().toISOString()},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='pickleball-data.json';a.click();};

window.addEventListener('keydown',e=>{if(e.key==='Escape'){if(quizState.active)closeQuiz();else if(!document.getElementById('dashOverlay').classList.contains('hidden'))document.getElementById('dashOverlay').classList.add('hidden');}});

// Init
renderTabs(); renderContent(); renderOverallBar();
</script>
