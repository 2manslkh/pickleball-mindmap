<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pickleball Strategy — Grandmaster Edition</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; overflow: hidden; }
    #mindmap { width: 100vw; height: 100vh; }
    .controls { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 8px; z-index: 100; }
    .controls button { background: #1e2030; border: 1px solid #333; color: #e2e8f0; width: 40px; height: 40px; border-radius: 8px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    .controls button:hover { background: #2a2d42; }
    .title-bar { position: fixed; top: 0; left: 0; right: 0; padding: 16px 24px; background: linear-gradient(180deg, rgba(15,17,23,0.95) 0%, rgba(15,17,23,0) 100%); z-index: 100; pointer-events: none; }
    .title-bar h1 { font-size: 18px; font-weight: 700; color: #e2e8f0; }
    .title-bar p { font-size: 12px; color: #64748b; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="title-bar">
    <h1>🏓♟️ Pickleball Strategy — Grandmaster Edition</h1>
    <p>Scroll to zoom · Drag to pan · Click nodes to expand</p>
  </div>
  <svg id="mindmap"></svg>
  <div class="controls">
    <button id="zoomIn">+</button>
    <button id="zoomOut">−</button>
    <button id="resetView">⌂</button>
  </div>

  <script>
    const data = {
      id: 'root', label: 'WIN\nPICKLEBALL', sub: 'Think like a GM', color: '#e2e8f0', bg: '#1a1f2e', stroke: '#1a1f2e',
      children: [
        {
          id: 'score', label: 'SCORE POINTS', bg: '#d5e8d4', stroke: '#82b366', color: '#1a1a1a',
          children: [
            { id: 'force_ue', label: 'Force Opponent\nUnforced Errors', bg: '#d5e8d4', stroke: '#82b366', color: '#1a1a1a',
              children: [
                { id: 'diff_balls', label: 'Give them\ndifficult balls', sub: '(calibrate to skill level)', bg: '#d5e8d4', stroke: '#82b366', color: '#1a1a1a' },
                { id: 'exploit', label: 'Exploit their\nweaknesses', bg: '#d5e8d4', stroke: '#82b366', color: '#1a1a1a',
                  children: [
                    { id: 'cw', label: 'Create Weaknesses', bg: '#fff2cc', stroke: '#d6b656', color: '#1a1a1a', highlight: true,
                      children: [
                        { id: 'w1', label: 'Weak side', sub: '(backhand)', bg: '#fff2cc', stroke: '#d6b656', color: '#1a1a1a' },
                        { id: 'w2', label: 'Weaker player', bg: '#fff2cc', stroke: '#d6b656', color: '#1a1a1a' },
                        { id: 'w3', label: 'Middle', sub: '(confusion)', bg: '#fff2cc', stroke: '#d6b656', color: '#1a1a1a' },
                        { id: 'w4', label: 'Move laterally', sub: '(open court)', bg: '#fff2cc', stroke: '#d6b656', color: '#1a1a1a' },
                        { id: 'w5', label: 'Change pace\n& spin', bg: '#fff2cc', stroke: '#d6b656', color: '#1a1a1a' },
                        { id: 'w6', label: 'At their feet', sub: '(force pop-ups)', bg: '#fff2cc', stroke: '#d6b656', color: '#1a1a1a' },
                      ]
                    }
                  ]
                }
              ]
            },
            { id: 'attack', label: 'Attack to Win\nthe Point', bg: '#d5e8d4', stroke: '#82b366', color: '#1a1a1a',
              children: [
                { id: 'high_balls', label: 'Best attack:\nHigh balls at kitchen', sub: '(lowest variance)', bg: '#d5e8d4', stroke: '#82b366', color: '#1a1a1a', highlight: true },
                { id: 'atk_types', label: 'Attack Types', bg: '#d5e8d4', stroke: '#82b366', color: '#1a1a1a',
                  children: [
                    { id: 'at1', label: 'Speed-up\nat body/feet', bg: '#d5e8d4', stroke: '#82b366', color: '#1a1a1a' },
                    { id: 'at2', label: 'Erne', bg: '#d5e8d4', stroke: '#82b366', color: '#1a1a1a' },
                    { id: 'at3', label: 'Overhead smash', bg: '#d5e8d4', stroke: '#82b366', color: '#1a1a1a' },
                    { id: 'at4', label: 'Roll volley', sub: '(topspin put-away)', bg: '#d5e8d4', stroke: '#82b366', color: '#1a1a1a' },
                  ]
                }
              ]
            }
          ]
        },
        {
          id: 'nolose', label: "DON'T LOSE\nPOINTS", bg: '#f8cecc', stroke: '#b85450', color: '#1a1a1a',
          children: [
            { id: 'avoid_ue', label: 'Avoid Unforced\nErrors', bg: '#f8cecc', stroke: '#b85450', color: '#1a1a1a',
              children: [
                { id: 'drill', label: 'Drill technique', sub: '(reps build consistency)', bg: '#f8cecc', stroke: '#b85450', color: '#1a1a1a',
                  children: [
                    { id: 'dr1', label: 'Dinks', bg: '#f8cecc', stroke: '#b85450', color: '#1a1a1a' },
                    { id: 'dr2', label: '3rd shot', bg: '#f8cecc', stroke: '#b85450', color: '#1a1a1a' },
                    { id: 'dr3', label: 'Resets', bg: '#f8cecc', stroke: '#b85450', color: '#1a1a1a' },
                  ]
                },
                { id: 'margins', label: 'Play with margin', sub: '(2ft over net, 2ft inside lines)', bg: '#f8cecc', stroke: '#b85450', color: '#1a1a1a' },
              ]
            },
            { id: 'smart', label: 'Smart Shot\nSelection', bg: '#f8cecc', stroke: '#b85450', color: '#1a1a1a',
              children: [
                { id: 'ss1', label: 'High % shots', sub: '(unless clear put-away)', bg: '#f8cecc', stroke: '#b85450', color: '#1a1a1a' },
                { id: 'ss2', label: 'Never speed up\nbelow the net', bg: '#f8cecc', stroke: '#b85450', color: '#1a1a1a' },
              ]
            },
            { id: 'defense', label: 'Defense &\nResets', bg: '#f8cecc', stroke: '#b85450', color: '#1a1a1a',
              children: [
                { id: 'def1', label: 'Soft block back\nto kitchen', bg: '#f8cecc', stroke: '#b85450', color: '#1a1a1a' },
                { id: 'def2', label: 'Absorb pace', sub: '(dead paddle, drop weight)', bg: '#f8cecc', stroke: '#b85450', color: '#1a1a1a' },
                { id: 'def3', label: 'Lob to buy time', sub: '(emergency only)', bg: '#f8cecc', stroke: '#b85450', color: '#1a1a1a' },
                { id: 'def4', label: 'Survive > hero shot', sub: '(let THEM make the error)', bg: '#f8cecc', stroke: '#b85450', color: '#1a1a1a', highlight: true },
              ]
            }
          ]
        },
        {
          id: 'position', label: 'POSITIONAL\nPLAY', sub: 'Chess: Control key squares', bg: '#dae8fc', stroke: '#6c8ebf', color: '#1a1a1a',
          children: [
            { id: 'kitchen_ctrl', label: 'Kitchen Line\n= Center Control', sub: 'Chess: d4/e4 domination', bg: '#dae8fc', stroke: '#6c8ebf', color: '#1a1a1a', highlight: true,
              children: [
                { id: 'kc1', label: 'Both players at\nkitchen ASAP', bg: '#dae8fc', stroke: '#6c8ebf', color: '#1a1a1a' },
                { id: 'kc2', label: 'Transition zone\n= no man\'s land', sub: '(pass through, never camp)', bg: '#dae8fc', stroke: '#6c8ebf', color: '#1a1a1a' },
                { id: 'kc3', label: '3rd shot drop =\nyour ticket to net', bg: '#dae8fc', stroke: '#6c8ebf', color: '#1a1a1a' },
                { id: 'kc4', label: 'Push them BACK\nfrom their line', sub: '(deep dinks, lobs, drives)', bg: '#dae8fc', stroke: '#6c8ebf', color: '#1a1a1a' },
              ]
            },
            { id: 'court_geom', label: 'Court Geometry', sub: 'Chess: Piece placement', bg: '#dae8fc', stroke: '#6c8ebf', color: '#1a1a1a',
              children: [
                { id: 'cg1', label: 'Cross-court', sub: '(more margin = safe)', bg: '#dae8fc', stroke: '#6c8ebf', color: '#1a1a1a' },
                { id: 'cg2', label: 'Down the line', sub: '(high risk / reward)', bg: '#dae8fc', stroke: '#6c8ebf', color: '#1a1a1a' },
                { id: 'cg3', label: 'Inside-out angles', sub: '(open up court)', bg: '#dae8fc', stroke: '#6c8ebf', color: '#1a1a1a' },
              ]
            },
            { id: 'formation', label: 'Formations', sub: 'Chess: Pawn structure', bg: '#dae8fc', stroke: '#6c8ebf', color: '#1a1a1a',
              children: [
                { id: 'fm1', label: 'Side by side', sub: '(default, cover court)', bg: '#dae8fc', stroke: '#6c8ebf', color: '#1a1a1a' },
                { id: 'fm2', label: 'Stacking', sub: '(keep forehands middle)', bg: '#dae8fc', stroke: '#6c8ebf', color: '#1a1a1a' },
                { id: 'fm3', label: 'Stay parallel', sub: '(move as a unit, no gaps)', bg: '#dae8fc', stroke: '#6c8ebf', color: '#1a1a1a' },
                { id: 'fm4', label: 'Overloading', sub: 'Chess: one piece can\'t\nguard both sides', bg: '#dae8fc', stroke: '#6c8ebf', color: '#1a1a1a', highlight: true },
              ]
            }
          ]
        },
        {
          id: 'tempo', label: 'TEMPO &\nINITIATIVE', sub: 'Chess: Who dictates play?', bg: '#fff2cc', stroke: '#d6b656', color: '#1a1a1a',
          children: [
            { id: 'opening', label: 'Opening Theory', sub: 'Chess: First 10 moves\nare preparation', bg: '#fff2cc', stroke: '#d6b656', color: '#1a1a1a', highlight: true,
              children: [
                { id: 'op1', label: 'Serve deep', sub: '(delay their advance)', bg: '#fff2cc', stroke: '#d6b656', color: '#1a1a1a' },
                { id: 'op2', label: 'Return deep', sub: '(pin them back)', bg: '#fff2cc', stroke: '#d6b656', color: '#1a1a1a' },
                { id: 'op3', label: '3rd shot = key move', sub: 'Drop to advance OR\nDrive to pressure', bg: '#fff2cc', stroke: '#d6b656', color: '#1a1a1a', highlight: true },
                { id: 'op4', label: '5th shot = confirm\nnet position', bg: '#fff2cc', stroke: '#d6b656', color: '#1a1a1a' },
              ]
            },
            { id: 'initiative', label: 'Keep Initiative', sub: 'Chess: Make them\nrespond to YOU', bg: '#fff2cc', stroke: '#d6b656', color: '#1a1a1a',
              children: [
                { id: 'in1', label: 'Zwischenzug', sub: 'Unexpected in-between\nshot they don\'t expect', bg: '#fff2cc', stroke: '#d6b656', color: '#1a1a1a', highlight: true },
                { id: 'in2', label: 'Control the pace', sub: '(slow them down or\nspeed them up)', bg: '#fff2cc', stroke: '#d6b656', color: '#1a1a1a' },
                { id: 'in3', label: 'Dictate rallies', sub: 'Make them react.\nReacting = losing.', bg: '#fff2cc', stroke: '#d6b656', color: '#1a1a1a' },
              ]
            },
            { id: 'prophylaxis', label: 'Prophylaxis', sub: 'Chess: Prevent their\nplan before it starts', bg: '#fff2cc', stroke: '#d6b656', color: '#1a1a1a', highlight: true,
              children: [
                { id: 'pr1', label: 'Keep ball low', sub: '(deny attackable balls)', bg: '#fff2cc', stroke: '#d6b656', color: '#1a1a1a' },
                { id: 'pr2', label: 'Don\'t give free\nspeed-up balls', bg: '#fff2cc', stroke: '#d6b656', color: '#1a1a1a' },
                { id: 'pr3', label: 'Paddle up, ready', sub: '(preparation = defense)', bg: '#fff2cc', stroke: '#d6b656', color: '#1a1a1a' },
                { id: 'pr4', label: 'Cut off angles', sub: '(position to remove\ntheir best options)', bg: '#fff2cc', stroke: '#d6b656', color: '#1a1a1a' },
              ]
            }
          ]
        },
        {
          id: 'psych', label: 'PSYCHOLOGY\n& READS', sub: 'Chess: Know your opponent', bg: '#e1d5e7', stroke: '#9673a6', color: '#1a1a1a',
          children: [
            { id: 'patterns', label: 'Pattern\nRecognition', sub: 'Chess: 50K positions\nin a GM\'s memory', bg: '#e1d5e7', stroke: '#9673a6', color: '#1a1a1a', highlight: true,
              children: [
                { id: 'pa1', label: 'Read paddle angle', sub: '(tells you where ball goes)', bg: '#e1d5e7', stroke: '#9673a6', color: '#1a1a1a' },
                { id: 'pa2', label: 'Read body position', sub: '(weight shift, shoulder turn)', bg: '#e1d5e7', stroke: '#9673a6', color: '#1a1a1a' },
                { id: 'pa3', label: 'Sequence recognition', sub: 'dink dink dink = speed-up\nincoming, be ready', bg: '#e1d5e7', stroke: '#9673a6', color: '#1a1a1a', highlight: true },
              ]
            },
            { id: 'adapt', label: 'Mid-Match\nAdaptation', sub: 'Chess: Adjust to\nopponent\'s style', bg: '#e1d5e7', stroke: '#9673a6', color: '#1a1a1a',
              children: [
                { id: 'ad1', label: 'First 3 games =\nscouting', sub: '(observe, catalog weaknesses)', bg: '#e1d5e7', stroke: '#9673a6', color: '#1a1a1a' },
                { id: 'ad2', label: 'They adjusted?\nYou adjust harder.', sub: '(never let them be comfortable)', bg: '#e1d5e7', stroke: '#9673a6', color: '#1a1a1a' },
                { id: 'ad3', label: 'Vary your patterns', sub: '(don\'t be predictable = don\'t\nlet THEM read YOU)', bg: '#e1d5e7', stroke: '#9673a6', color: '#1a1a1a' },
              ]
            },
            { id: 'mental', label: 'Mental\nToughness', sub: 'Chess: Clock pressure\n& endgame grind', bg: '#e1d5e7', stroke: '#9673a6', color: '#1a1a1a',
              children: [
                { id: 'mt1', label: 'Reset after\nevery point', sub: '(last point is dead,\nnext point is all)', bg: '#e1d5e7', stroke: '#9673a6', color: '#1a1a1a' },
                { id: 'mt2', label: 'Play the score', sub: 'Ahead? Be patient.\nBehind? Take calculated risks.', bg: '#e1d5e7', stroke: '#9673a6', color: '#1a1a1a', highlight: true },
                { id: 'mt3', label: 'Endgame mentality', sub: '9-9? Play YOUR game.\nDon\'t tighten up.', bg: '#e1d5e7', stroke: '#9673a6', color: '#1a1a1a' },
              ]
            }
          ]
        }
      ]
    };

    // Layout engine
    const NODE_W = 160, NODE_H_BASE = 44, PAD_X = 40, PAD_Y = 24, SUB_SIZE = 10;
    const svg = document.getElementById('mindmap');
    let viewBox = { x: 0, y: 0, w: 1600, h: 900 };
    let nodes = [], edges = [];
    let collapsed = new Set();

    function nodeHeight(d) {
      let h = NODE_H_BASE;
      const lines = (d.label || '').split('\n').length;
      if (lines > 1) h += (lines - 1) * 14;
      if (d.sub) h += (d.sub.split('\n').length) * 12 + 4;
      return h;
    }

    function subtreeSize(d) {
      if (!d.children || d.children.length === 0 || collapsed.has(d.id)) return nodeHeight(d) + PAD_Y;
      let total = 0;
      for (const c of d.children) total += subtreeSize(c);
      return Math.max(total, nodeHeight(d) + PAD_Y);
    }

    function layout(d, x, y, availH) {
      const h = nodeHeight(d);
      const nx = x, ny = y + availH / 2 - h / 2;
      nodes.push({ ...d, x: nx, y: ny, w: NODE_W, h, depth: d._depth || 0 });

      if (d.children && d.children.length > 0 && !collapsed.has(d.id)) {
        const childX = x + NODE_W + PAD_X;
        let totalH = 0;
        const sizes = d.children.map(c => { c._depth = (d._depth || 0) + 1; return subtreeSize(c); });
        for (const s of sizes) totalH += s;
        let curY = y + (availH - totalH) / 2;
        for (let i = 0; i < d.children.length; i++) {
          const ch = sizes[i];
          layout(d.children[i], childX, curY, ch);
          const childNode = nodes[nodes.length - 1];
          edges.push({
            x1: nx + NODE_W, y1: ny + h / 2,
            x2: childX, y2: curY + ch / 2,
            stroke: d.stroke || '#666', depth: (d._depth || 0)
          });
          curY += ch;
        }
      }
    }

    function render() {
      nodes = []; edges = [];
      data._depth = 0;
      const totalH = subtreeSize(data);
      layout(data, 40, 0, totalH);

      // compute bounds
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const n of nodes) {
        minX = Math.min(minX, n.x);
        minY = Math.min(minY, n.y);
        maxX = Math.max(maxX, n.x + n.w);
        maxY = Math.max(maxY, n.y + n.h);
      }
      const pad = 60;
      viewBox = { x: minX - pad, y: minY - pad, w: maxX - minX + pad * 2, h: maxY - minY + pad * 2 };

      let html = '';

      // edges
      for (const e of edges) {
        const mx = (e.x1 + e.x2) / 2;
        const sw = Math.max(1.5, 3 - e.depth * 0.5);
        html += `<path d="M${e.x1},${e.y1} C${mx},${e.y1} ${mx},${e.y2} ${e.x2},${e.y2}" fill="none" stroke="${e.stroke}" stroke-width="${sw}" opacity="0.6"/>`;
      }

      // nodes
      for (const n of nodes) {
        const isRoot = n.id === 'root';
        const rx = isRoot ? n.w / 2 : 8;
        const ry = isRoot ? n.h / 2 : 8;
        const hasKids = n.children && n.children.length > 0;
        const isCollapsed = collapsed.has(n.id);
        const shadowColor = n.highlight ? n.stroke : 'rgba(0,0,0,0.3)';
        const shadowBlur = n.highlight ? 8 : 4;

        html += `<g class="node" data-id="${n.id}" style="cursor:${hasKids ? 'pointer' : 'default'}">`;
        html += `<defs><filter id="shadow-${n.id}"><feDropShadow dx="0" dy="2" stdDeviation="${shadowBlur}" flood-color="${shadowColor}" flood-opacity="0.4"/></filter></defs>`;

        if (isRoot) {
          html += `<ellipse cx="${n.x + n.w / 2}" cy="${n.y + n.h / 2}" rx="${rx}" ry="${ry}" fill="${n.bg}" stroke="${n.stroke}" stroke-width="3" filter="url(#shadow-${n.id})"/>`;
        } else {
          html += `<rect x="${n.x}" y="${n.y}" width="${n.w}" height="${n.h}" rx="8" fill="${n.bg}" stroke="${n.stroke}" stroke-width="${n.highlight ? 2.5 : 1.5}" filter="url(#shadow-${n.id})"/>`;
        }

        // label
        const labelLines = (n.label || '').split('\n');
        const subLines = n.sub ? n.sub.split('\n') : [];
        const totalTextH = labelLines.length * 16 + subLines.length * 12;
        let ty = n.y + n.h / 2 - totalTextH / 2 + 12;

        for (const line of labelLines) {
          const bold = n.depth <= 1 || line === line.toUpperCase();
          html += `<text x="${n.x + n.w / 2}" y="${ty}" text-anchor="middle" fill="${n.color || '#1a1a1a'}" font-size="${isRoot ? 16 : 12}" font-weight="${bold ? 700 : 600}" font-family="Inter, system-ui, sans-serif">${escHtml(line)}</text>`;
          ty += 16;
        }
        for (const line of subLines) {
          html += `<text x="${n.x + n.w / 2}" y="${ty}" text-anchor="middle" fill="${n.color || '#1a1a1a'}" font-size="9" opacity="0.6" font-family="Inter, system-ui, sans-serif">${escHtml(line)}</text>`;
          ty += 12;
        }

        // collapse indicator
        if (hasKids) {
          const cx = n.x + n.w - 10, cy = n.y + 10;
          html += `<circle cx="${cx}" cy="${cy}" r="6" fill="${n.stroke}" opacity="0.5"/>`;
          html += `<text x="${cx}" y="${cy + 3.5}" text-anchor="middle" fill="white" font-size="9" font-weight="bold">${isCollapsed ? '+' : '−'}</text>`;
        }

        html += `</g>`;
      }

      // banner
      const bannerY = viewBox.y + viewBox.h - 80;
      const bannerX = viewBox.x + viewBox.w / 2;
      html += `<rect x="${bannerX - 340}" y="${bannerY}" width="680" height="50" rx="10" fill="#1a1f2e" stroke="#333" stroke-width="1"/>`;
      html += `<text x="${bannerX}" y="${bannerY + 22}" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700" font-family="Inter, system-ui, sans-serif">THE GM PRINCIPLE: Every shot is a move. Every move has a PURPOSE.</text>`;
      html += `<text x="${bannerX}" y="${bannerY + 38}" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Inter, system-ui, sans-serif">If you can't explain WHY you hit that shot, you shouldn't have hit it.</text>`;

      svg.innerHTML = html;
      svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);

      // click handlers
      svg.querySelectorAll('.node').forEach(g => {
        g.addEventListener('click', () => {
          const id = g.dataset.id;
          const nd = findNode(data, id);
          if (nd && nd.children && nd.children.length > 0) {
            if (collapsed.has(id)) collapsed.delete(id); else collapsed.add(id);
            render();
          }
        });
      });
    }

    function findNode(d, id) {
      if (d.id === id) return d;
      if (d.children) for (const c of d.children) { const r = findNode(c, id); if (r) return r; }
      return null;
    }

    function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // Pan & zoom
    let isPanning = false, panStart = { x: 0, y: 0 }, vbStart = {};
    svg.addEventListener('mousedown', e => { if (e.target === svg || e.target.tagName === 'path') { isPanning = true; panStart = { x: e.clientX, y: e.clientY }; vbStart = { ...viewBox }; }});
    window.addEventListener('mousemove', e => { if (!isPanning) return; const scale = viewBox.w / svg.clientWidth; viewBox.x = vbStart.x - (e.clientX - panStart.x) * scale; viewBox.y = vbStart.y - (e.clientY - panStart.y) * scale; svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`); });
    window.addEventListener('mouseup', () => isPanning = false);
    svg.addEventListener('wheel', e => { e.preventDefault(); const factor = e.deltaY > 0 ? 1.1 : 0.9; const rect = svg.getBoundingClientRect(); const mx = viewBox.x + (e.clientX - rect.left) / rect.width * viewBox.w; const my = viewBox.y + (e.clientY - rect.top) / rect.height * viewBox.h; viewBox.w *= factor; viewBox.h *= factor; viewBox.x = mx - (e.clientX - rect.left) / rect.width * viewBox.w; viewBox.y = my - (e.clientY - rect.top) / rect.height * viewBox.h; svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`); }, { passive: false });

    // Touch support
    let lastTouchDist = 0, lastTouchCenter = null;
    svg.addEventListener('touchstart', e => { if (e.touches.length === 1) { isPanning = true; panStart = { x: e.touches[0].clientX, y: e.touches[0].clientY }; vbStart = { ...viewBox }; } else if (e.touches.length === 2) { isPanning = false; lastTouchDist = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY); lastTouchCenter = { x: (e.touches[0].clientX + e.touches[1].clientX) / 2, y: (e.touches[0].clientY + e.touches[1].clientY) / 2 }; vbStart = { ...viewBox }; }}, { passive: true });
    svg.addEventListener('touchmove', e => { e.preventDefault(); if (e.touches.length === 1 && isPanning) { const scale = viewBox.w / svg.clientWidth; viewBox.x = vbStart.x - (e.touches[0].clientX - panStart.x) * scale; viewBox.y = vbStart.y - (e.touches[0].clientY - panStart.y) * scale; svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`); } else if (e.touches.length === 2 && lastTouchCenter) { const dist = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY); const factor = lastTouchDist / dist; const rect = svg.getBoundingClientRect(); const mx = vbStart.x + (lastTouchCenter.x - rect.left) / rect.width * vbStart.w; const my = vbStart.y + (lastTouchCenter.y - rect.top) / rect.height * vbStart.h; viewBox.w = vbStart.w * factor; viewBox.h = vbStart.h * factor; viewBox.x = mx - (lastTouchCenter.x - rect.left) / rect.width * viewBox.w; viewBox.y = my - (lastTouchCenter.y - rect.top) / rect.height * viewBox.h; svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`); }}, { passive: false });
    svg.addEventListener('touchend', () => { isPanning = false; lastTouchDist = 0; lastTouchCenter = null; });

    // Controls
    document.getElementById('zoomIn').onclick = () => { const cx = viewBox.x + viewBox.w / 2, cy = viewBox.y + viewBox.h / 2; viewBox.w *= 0.8; viewBox.h *= 0.8; viewBox.x = cx - viewBox.w / 2; viewBox.y = cy - viewBox.h / 2; svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`); };
    document.getElementById('zoomOut').onclick = () => { const cx = viewBox.x + viewBox.w / 2, cy = viewBox.y + viewBox.h / 2; viewBox.w *= 1.25; viewBox.h *= 1.25; viewBox.x = cx - viewBox.w / 2; viewBox.y = cy - viewBox.h / 2; svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`); };
    document.getElementById('resetView').onclick = () => { render(); };

    render();
  </script>
</body>
</html>
